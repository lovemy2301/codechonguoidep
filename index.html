<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>8/3 - Gửi Chị Hiền Xinh Gái Nhé!</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
overflow:hidden;

/* background romantic pink illustration */

background:
linear-gradient(rgba(255,182,193,0.35),rgba(255,182,193,0.35)),
url("background.png")
center/cover no-repeat fixed;

/* hiệu ứng chuyển động nhẹ */

animation:bgMove 25s ease-in-out infinite alternate;
}

@keyframes bgMove{
0%{
background-size:100%;
}
100%{
background-size:108%;
}
}

@keyframes bgMove{
0%{
background-size:100%;
}
100%{
background-size:108%;
}
}

/* chuyển động nền */

@keyframes bgMove{
0%{
background-size:100%;
}
100%{
background-size:110%;
}
}
/* hiệu ứng zoom chậm */

@keyframes bgMove{
0%{
background-size:100%;
}
100%{
background-size:110%;
}
}

/* màn hình mở quà */

#overlay{
position:fixed;
inset:0;

background:rgba(0,0,0,0.35);

backdrop-filter:blur(4px);

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

z-index:1;
}

/* sparkle */

.sparkle{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
animation:sparkle 3s infinite;
pointer-events:none;
z-index:0;
}

@keyframes sparkle{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

/* card */

.card{
position:relative;
background:white;
padding:50px 60px;
border-radius:40px;
text-align:center;
width:420px;
box-shadow:0 20px 40px rgba(0,0,0,.2);
z-index:5;
}

.card:before{
content:"";
position:absolute;
inset:-10px;
border:6px solid #ffd6e5;
border-radius:45px;
}

/* hoa */

.flower{
width:150px;
margin-bottom:20px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

/* title */

.title{
font-family:'Dancing Script',cursive;
font-size:28px;
color:#6d4c41;
margin-bottom:25px;
}

/* button */

.btn{
background:linear-gradient(45deg,#7b5cff,#b388ff);
border:none;
color:white;
padding:14px 40px;
border-radius:30px;
font-size:16px;
cursor:pointer;
transition:.3s;
box-shadow:0 10px 20px rgba(0,0,0,.2);
position:relative;
z-index:10;
}

.btn:hover{
transform:scale(1.08);
}

/* trang thư */

#main{
display:none;
position:absolute;
inset:0;

background:rgba(0,0,0,0.25);

backdrop-filter:blur(3px);

justify-content:center;
align-items:center;
}

/* thư */

.letter{
position:relative;
max-width:700px;
padding:60px 70px;

background:#f3e2c7;

border-radius:30px;

box-shadow:
0 20px 60px rgba(0,0,0,0.35),
inset 0 0 80px rgba(255,255,255,0.4);

font-family:'Dancing Script',cursive;

}

/* viền giấy lượn sóng */

.letter:before{
content:"";
position:absolute;
inset:-8px;

border-radius:40px;

border:4px dashed #ff6fa5;

pointer-events:none;
}

/* watermark nhẹ */

.letter:after{
content:"love";
position:absolute;
font-size:180px;
color:rgba(255,255,255,0.15);
left:50%;
top:50%;
transform:translate(-50%,-50%) rotate(-20deg);
pointer-events:none;
}

.text{
font-size:28px;
line-height:1;
color:#5c5346;
white-space:pre-line;
}

.signature{
margin-top:30px;
text-align:right;
font-family:'Dancing Script',cursive;
font-size:32px;
color:#d81b60;
opacity:0;
transition:2s;
}

/* tim */

.heart{
position:absolute;
font-size:25px;
animation:fly linear forwards;
pointer-events:none;
}

/* ảnh */

.photo{
position:absolute;
width:120px;
border-radius:15px;
border:4px solid white;
box-shadow:0 10px 20px rgba(0,0,0,.2);
animation:fly linear forwards;
pointer-events:none;
}

@keyframes fly{
0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}
10%{
opacity:1;
}
100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}
}

</style>
</head>

<body>

<div id="overlay">

<div class="card">

<img class="flower" src="https://cdn.lala.com.vn/image/1/230224/bo-10-bong-hoa-sap-sac-do-ruc-ro2.jpg">

<div class="title">
Chị đã sẵn sàng mỡ quà chưaaaaaaa?
</div>

<button class="btn" onclick="startSurprise()">
<3 Mở quàaaa!
</button>

</div>

</div>

<div id="main">

<div class="letter">

<div id="text" class="text"></div>

<div id="sign" class="signature">
C ơi thấy đẹp khum ❤️
</div>

</div>

</div>

<audio id="music" loop>
<source src="NGONGIODEMQUATRANGSANGDEMNAY.mp3" type="audio/mpeg">
</audio>

<script>

const message=`Chị Hiền😍❤️💕,

8/3 vui vẻ nha.

Chị đẹp của em phải luôn thật hạnh phúc đấy nhé.

Có một chuyện là c đùng hỏi sao e có ảnh nha, tại em mới tải trên tik thui.

Chiêm nghưỡng vẻ đẹp của công chúa bằng những tấm ảnh nào.

Chúc c 8/3 vui vẻ, phải thật hạnh phúc nhé...
❤️💕😍`;

const photos=[
"test.jpg",
"test1.jpg",
"test2.jpg",
"test3.jpg",
"test4.jpg",
"test5.jpg",
"test6.jpg",
"test7.jpg",
"test8.jpg",
"test9.jpg",
"test10.jpg"
];

function startSurprise(){

document.getElementById("music").play().catch(()=>{});

document.getElementById("overlay").style.display="none";

let main=document.getElementById("main");

main.style.display="flex";

typeWriter();

setInterval(createHeart,900);
setInterval(createPhoto,2000);

}

function typeWriter(){

let i=0;
let el=document.getElementById("text");

function type(){

if(i<message.length){
el.textContent+=message.charAt(i);
i++;
setTimeout(type,40);
}
else{
document.getElementById("sign").style.opacity=1;
}

}

type();
}

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"%";
heart.style.bottom="-20px";
heart.style.animationDuration=6+Math.random()*4+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),10000);
}

function createPhoto(){

let img=document.createElement("img");

img.className="photo";
img.src=photos[Math.floor(Math.random()*photos.length)];

img.style.left=Math.random()*100+"%";
img.style.bottom="-50px";
img.style.animationDuration=8+Math.random()*4+"s";

document.body.appendChild(img);

setTimeout(()=>img.remove(),12000);
}

/* sparkle */

for(let i=0;i<40;i++){

let s=document.createElement("div");

s.className="sparkle";

s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
s.style.animationDelay=Math.random()*3+"s";

document.getElementById("overlay").appendChild(s);

}

</script>

</body>
</html>
